plugins {
    id 'com.gradleup.shadow'
}

import org.objectweb.asm.*

architectury {
    platformSetupLoomIde()
    fabric()
}

configurations {
    common {
        canBeResolved = true
        canBeConsumed = false
    }
    compileClasspath.extendsFrom common
    runtimeClasspath.extendsFrom common
    developmentFabric.extendsFrom common

    shadowBundle {
        canBeResolved = true
        canBeConsumed = false
    }

    // TinyRemapper CLI — resolved separately to avoid classpath conflicts with Loom
    tinyRemapperCli {
        canBeResolved = true
        canBeConsumed = false
    }
}

dependencies {
    modImplementation "net.fabricmc:fabric-loader:$rootProject.fabric_loader_version"

    // Fabric API
    modImplementation "net.fabricmc.fabric-api:fabric-api:$rootProject.fabric_api_version"

    // Architectury API
    modImplementation "dev.architectury:architectury-fabric:$rootProject.architectury_api_version"

    // Create Fabric — single dependency, everything else pulled in transitively
    // (porting_lib, flywheel, ponder, registrate, forge-config-api-port, milk-lib, etc.)
    modImplementation("com.simibubi.create:create-fabric:${rootProject.create_fabric_version}")

    // Create Big Cannons (Fabric)
    modImplementation("maven.modrinth:create-big-cannons:${rootProject.cbc_fabric_version_id}")
    // RPL is JiJ'd in CBC but Loom doesn't extract JiJ jars for dev — must declare explicitly
    modRuntimeOnly("com.rbasamoyai:ritchiesprojectilelib:${rootProject.rpl_fabric_version}") { transitive = false }

    common(project(path: ':common', configuration: 'namedElements')) { transitive = false }
    shadowBundle(project(path: ':common', configuration: 'namedElements')) { transitive = false }

    tinyRemapperCli 'net.fabricmc:tiny-remapper:0.10.3'
}
