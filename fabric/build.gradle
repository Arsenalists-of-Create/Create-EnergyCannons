task patchRemappedCbc {
    description = 'Patches un-remapped Fabric intermediary names in CBC jar'
    // Run every time
    outputs.upToDateWhen { false }

    doLast {
        def remappedDir = new File(rootProject.projectDir, ".gradle/loom-cache/remapped_mods")
        if (!remappedDir.exists()) {
            logger.lifecycle("No remapped_mods directory found, skipping CBC patching")
            return
        }

        // Find CBC jar(s) in the Fabric remapped mods cache (non-Forge dirs)
        def cbcJars = []
        remappedDir.eachDirRecurse { dir ->
            if (dir.path.contains('forge')) return
            dir.eachFileMatch(~"create-big-cannons-${rootProject.cbc_fabric_version_id}\\.jar") { f ->
                cbcJars << f
            }
        }

        if (cbcJars.isEmpty()) {
            logger.lifecycle("No remapped CBC jar found, skipping patching")
            return
        }

        cbcJars.each { jarFile ->
            // Check if patching is needed (any method_XXXXX references left?)
            boolean needsPatch = false
            new java.util.zip.ZipInputStream(jarFile.newInputStream()).withCloseable { checkZis ->
                java.util.zip.ZipEntry e
                while ((e = checkZis.nextEntry) != null) {
                    if (e.name.endsWith('.class')) {
                        def data = checkZis.readAllBytes()
                        def str = new String(data, java.nio.charset.StandardCharsets.ISO_8859_1)
                        if (str.contains('method_') || str.contains('field_')) {
                            // Verify it's an intermediary name we know about
                            for (def key : intermediaryMethodMap.keySet()) {
                                if (str.contains(key)) { needsPatch = true; break }
                            }
                            if (!needsPatch) {
                                for (def key : intermediaryFieldMap.keySet()) {
                                    if (str.contains(key)) { needsPatch = true; break }
                                }
                            }
                        }
                    }
                    if (needsPatch) break
                }
            }

            if (!needsPatch) {
                logger.lifecycle("CBC jar already patched, skipping: ${jarFile.name}")
                return
            }

            logger.lifecycle("Patching un-remapped intermediary names in: ${jarFile.name}")
            def tempJar = new File(jarFile.parentFile, jarFile.name + ".patching")
            int patchedMethods = 0
            int patchedFields = 0

            new java.util.zip.ZipInputStream(jarFile.newInputStream()).withCloseable { zis ->
                new java.util.zip.ZipOutputStream(tempJar.newOutputStream()).withCloseable { zos ->
                    java.util.zip.ZipEntry entry
                    while ((entry = zis.nextEntry) != null) {
                        def newEntry = new java.util.zip.ZipEntry(entry.name)
                        if (entry.isDirectory()) {
                            zos.putNextEntry(newEntry)
                            zos.closeEntry()
                            continue
                        }

                        def bytes = zis.readAllBytes()
                        zos.putNextEntry(newEntry)

                        if (entry.name.endsWith('.class')) {
                            try {
                                def cr = new ClassReader(bytes)
                                def cw = new ClassWriter(0)
                                def cv = new ClassVisitor(Opcodes.ASM9, cw) {
                                    @Override
                                    MethodVisitor visitMethod(int access, String name, String descriptor, String signature, String[] exceptions) {
                                        // Rename method declarations
                                        def mappedName = intermediaryMethodMap[name]
                                        if (mappedName != null) { patchedMethods++; name = mappedName }
                                        def mv = super.visitMethod(access, name, descriptor, signature, exceptions)
                                        return new MethodVisitor(Opcodes.ASM9, mv) {
                                            @Override
                                            void visitMethodInsn(int opcode, String owner, String mName, String desc, boolean isInterface) {
                                                def mapped = intermediaryMethodMap[mName]
                                                if (mapped != null) { patchedMethods++; mName = mapped }
                                                super.visitMethodInsn(opcode, owner, mName, desc, isInterface)
                                            }
                                            @Override
                                            void visitFieldInsn(int opcode, String owner, String fName, String desc) {
                                                def mapped = intermediaryFieldMap[fName]
                                                if (mapped != null) { patchedFields++; fName = mapped }
                                                super.visitFieldInsn(opcode, owner, fName, desc)
                                            }
                                            @Override
                                            void visitInvokeDynamicInsn(String idName, String idDesc, Handle bsm, Object... bsmArgs) {
                                                def newArgs = new Object[bsmArgs.length]
                                                for (int i = 0; i < bsmArgs.length; i++) {
                                                    if (bsmArgs[i] instanceof Handle) {
                                                        def h = (Handle) bsmArgs[i]
                                                        def mapped = intermediaryMethodMap[h.name]
                                                        if (mapped != null) {
                                                            patchedMethods++
                                                            newArgs[i] = new Handle(h.tag, h.owner, mapped, h.desc, h.isInterface)
                                                        } else {
                                                            newArgs[i] = h
                                                        }
                                                    } else {
                                                        newArgs[i] = bsmArgs[i]
                                                    }
                                                }
                                                super.visitInvokeDynamicInsn(idName, idDesc, bsm, newArgs)
                                            }
                                        }
                                    }
                                    @Override
                                    FieldVisitor visitField(int access, String name, String descriptor, String signature, Object value) {
                                        // Rename field declarations
                                        def mappedName = intermediaryFieldMap[name]
                                        if (mappedName != null) { patchedFields++; name = mappedName }
                                        return super.visitField(access, name, descriptor, signature, value)
                                    }
                                }
                                cr.accept(cv, 0)
                                zos.write(cw.toByteArray())
                            } catch (Exception ex) {
                                // If ASM fails on a class, copy it unmodified
                                logger.warn("Failed to patch class ${entry.name}: ${ex.message}")
                                zos.write(bytes)
                            }
                        } else {
                            zos.write(bytes)
                        }
                        zos.closeEntry()
                    }
                }
            }

            // Atomic replace
            jarFile.delete()
            tempJar.renameTo(jarFile)
            logger.lifecycle("Patched CBC: ${patchedMethods} method refs, ${patchedFields} field refs")
        }
    }
}

// Ensure patching runs before any compilation or runtime usage
tasks.named('compileJava') { dependsOn patchRemappedCbc }

processResources {
    inputs.property 'version', project.version

    filesMatching('fabric.mod.json') {
        expand version: inputs.properties.version
    }
}

shadowJar {
    exclude "architectury.common.json"
    exclude "architectury.common.marker"
    configurations = [project.configurations.shadowBundle]
    archiveClassifier = 'dev-shadow'
}
//another janky work around
// Loom 1.3.355 bug
// Jar.copy() and RemapJarTask.run() @TaskAction methods. On this JVM,
// copy() consistently runs last, overwriting remapped output with empty content.
// Fix: disable remapJar, use TinyRemapper CLI directly with proper hierarchy resolution.
remapJar.enabled = false

task remapShadowJar {
    dependsOn shadowJar
    description = 'Remaps shadow jar from named to intermediary via TinyRemapper CLI'
    outputs.upToDateWhen { false }

    doLast {
        def inputJar = shadowJar.archiveFile.get().asFile
        def outputJar = new File(layout.buildDirectory.dir('libs').get().asFile,
            "${base.archivesName.get()}-${project.version}.jar")
        outputJar.parentFile.mkdirs()
        if (outputJar.exists()) outputJar.delete()

        def mappingsFile = new File(gradle.gradleUserHomeDir,
            "caches/fabric-loom/${rootProject.minecraft_version}/loom.mappings.1_20_1.layered+hash.40359-v2/mappings.tiny")
        if (!mappingsFile.exists()) {
            throw new GradleException("Mappings file not found: ${mappingsFile}")
        }

        // Collect classpath jars for hierarchy resolution (MC + all mod deps)
        def cpJars = configurations.compileClasspath.files.collect { it.absolutePath }

        def remapArgs = [
            inputJar.absolutePath,
            outputJar.absolutePath,
            mappingsFile.absolutePath,
            'named',        // from namespace
            'intermediary'  // to namespace
        ] + cpJars

        project.javaexec {
            classpath = configurations.tinyRemapperCli
            mainClass = 'net.fabricmc.tinyremapper.Main'
            args = remapArgs
        }

        logger.lifecycle("Remapped ${inputJar.name} -> ${outputJar.name} (${outputJar.length()} bytes)")
    }
}
tasks.named('assemble') { dependsOn 'remapShadowJar' }
